<!DOCTYPE html>
<html>
<head>
<title>Physics Lab - Interactive Learning</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Fredoka', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
}

.header {
    position: relative;
    z-index: 10;
    padding: 60px 40px 40px 40px;
    text-align: center;
    animation: slideDown 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.header-subtitle {
    font-size: 1.2rem;
    color: rgba(255, 255, 255, 0.9);
    margin-bottom: 20px;
}

h1 {
    font-size: 4rem;
    font-weight: 700;
    background: linear-gradient(135deg, #FFE6EE, #FFC0CB);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0;
    letter-spacing: -1px;
}

.container {
    display: flex;
    justify-content: center;
    gap: 50px;
    padding: 80px 40px;
    flex-wrap: nowrap;
    position: relative;
    z-index: 5;
}

.card {
    width: 280px;
    height: 220px;
    border-radius: 35px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    text-decoration: none;
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
    border: 4px solid rgba(255, 255, 255, 0.2);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    animation: fadeInUp 0.6s ease-out;
    background: rgba(255, 192, 203, 0.9);
}

.card:nth-child(1) { animation-delay: 0.1s; }
.card:nth-child(2) { animation-delay: 0.2s; }
.card:nth-child(3) { animation-delay: 0.3s; }

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(40px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes slideDown {
    from {
        opacity: 0;
        transform: translateY(-30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.card-icon {
    font-size: 3.5rem;
    margin-bottom: 10px;
    display: block;
    transition: transform 0.4s ease;
}

.card-content {
    position: relative;
    z-index: 2;
    text-align: center;
    color: #b30059;
    font-weight: 700;
    font-size: 1.8rem;
    line-height: 1.3;
    transition: all 0.4s ease;
}

.card:hover {
    transform: translateY(-25px) scale(1.08);
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    border-color: rgba(255, 255, 255, 0.4);
    background: rgba(255, 182, 217, 0.95);
}

.card:hover .card-content {
    color: #8b0047;
}

.card:hover .card-icon {
    transform: scale(1.2) rotate(15deg);
}

.card:active {
    transform: translateY(-20px) scale(1.05);
}

.content-area {
    position: relative;
    z-index: 5;
    padding: 40px 60px;
    min-height: 400px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
}

.content-placeholder {
    background: rgba(255, 255, 255, 0.15);
    border: 3px solid rgba(255, 255, 255, 0.3);
    border-radius: 30px;
    padding: 50px;
    text-align: center;
    color: white;
    animation: fadeIn 0.6s ease;
    width: 100%;
    max-width: 900px;
    backdrop-filter: blur(10px);
}

.content-placeholder h2 {
    font-size: 2.5rem;
    margin-bottom: 20px;
    color: #FFE6EE;
}

.content-placeholder p {
    font-size: 1.2rem;
    line-height: 1.6;
    color: rgba(255, 255, 255, 0.95);
    margin-bottom: 30px;
}

.stats {
    display: flex;
    gap: 40px;
    margin-top: 30px;
    justify-content: center;
    width: 100%;
    flex-wrap: wrap;
}

.stat-box {
    background: rgba(255, 255, 255, 0.1);
    border: 2px solid rgba(255, 255, 255, 0.2);
    border-radius: 15px;
    padding: 20px 30px;
    text-align: center;
    color: white;
    backdrop-filter: blur(10px);
}

.stat-number {
    font-size: 2rem;
    font-weight: 700;
    color: #FFE6EE;
}

.stat-label {
    font-size: 0.9rem;
    color: rgba(255, 255, 255, 0.8);
    margin-top: 5px;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

@media (max-width: 1400px) {
    .container {
        gap: 30px;
        padding: 60px 20px;
    }
    
    h1 {
        font-size: 3.2rem;
    }
    
    .card {
        width: 250px;
        height: 200px;
    }
    
    .card-content {
        font-size: 1.6rem;
    }
}

@media (max-width: 900px) {
    .container {
        flex-wrap: wrap;
        gap: 20px;
    }
    
    h1 {
        font-size: 2.5rem;
    }
}

</style>
</head>

<body>

<div class="header">
    <div class="header-subtitle">Master the Laws of Motion & Energy</div>
    <h1>Physics Lab ⚡</h1>
</div>

<div class="container">
    <a class="card" href="work.html">
        <span class="card-icon">⚙️</span>
        <div class="card-content">
            Work<br>Activities
        </div>
    </a>

    <a class="card" href="potential.html">
        <span class="card-icon">⬆️</span>
        <div class="card-content">
            Potential<br>Energy
        </div>
    </a>

    <a class="card" href="kinetic.html">
        <span class="card-icon">💨</span>
        <div class="card-content">
            Kinetic<br>Energy
        </div>
    </a>
</div>

<div class="content-area">
    <div class="content-placeholder">
        <h2>Choose your experiment!</h2>
        <p>Click on a card above to explore Work, Potential Energy, or Kinetic Energy</p>
        
        <div class="stats">
            <div class="stat-box">
                <div class="stat-number">6</div>
                <div class="stat-label">Interactive Games</div>
            </div>
            <div class="stat-box">
                <div class="stat-number">3</div>
                <div class="stat-label">Deep Lessons</div>
            </div>
            <div class="stat-box">
                <div class="stat-number">50+</div>
                <div class="stat-label">Physics Facts</div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
